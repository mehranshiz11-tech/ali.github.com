<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>چت جی‌پی‌تی حرفه‌ای</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <header>
    <h1>ChatGPT حرفه‌ای</h1>
    <button id="themeToggle">🌙</button>
  </header>

  <div id="chat-container">
    <div id="chat"></div>
  </div>

  <div id="input-area">
    <input type="text" id="userInput" placeholder="پیام خود را بنویسید..." onkeypress="if(event.key==='Enter'){sendMessage();}">
    <button onclick="sendMessage()">ارسال</button>
  </div>
</div>

<script src="chatbot.js"></script>
</body>
</html>
