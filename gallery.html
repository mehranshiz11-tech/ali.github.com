<!DOCTYPE HTML>
<html>
<head>
    <title>Gallery</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            text-align: center;
        }

        .modal img {
            max-width: 80%;
            max-height: 80%;
            margin-top: 60px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
        }

        .nav {
            position: absolute;
            top: 50%;
            font-size: 40px;
            cursor: pointer;
        }

        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>

<body>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
    <span class="close" onclick="closeModal()">×</span>
    <span class="nav prev" onclick="change(-1)">❮</span>
    <img id="modalImg">
    <span class="nav next" onclick="change(1)">❯</span>
</div>

<script>
const images = [
  "https://picsum.photos/300?1",
  "https://picsum.photos/300?2",
  "https://picsum.photos/300?3",
  "https://picsum.photos/300?4",
  "https://picsum.photos/300?5"
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

let index = 0;

images.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => open(i);
    gallery.appendChild(img);
});

function open(i) {
    index = i;
    modal.style.display = "block";
    modalImg.src = images[index];
}

function closeModal() {
    modal.style.display = "none";
}

function change(step) {
    index += step;
    if (index < 0) index = images.length - 1;
    if (index >= images.length) index = 0;
    modalImg.src = images[index];
}
</script>

</body>
</html>
