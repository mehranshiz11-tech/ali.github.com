<!DOCTYPE HTML>
<html>
<head>
    <title>Mehran Farahi - Gallery</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

    <style>
        /* گالری */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
            max-width: 700px;
            margin: 20px auto;
            z-index: 5; /* روی overlay */
            position: relative;
        }

        .gallery img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* مودال */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            text-align: center;
        }

        .modal img {
            max-width: 80%;
            max-height: 80%;
            margin-top: 60px;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            font-size: 40px;
            color: white;
            cursor: pointer;
            user-select: none;
        }

        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>

<body class="is-preload">
<div id="wrapper">
    <div id="bg"></div>
    <div id="overlay"></div>

    <div id="main">

        <header id="header">
            <h1>Mehran Farahi</h1>
            <p>Gallery</p>
        </header>

        <!-- گالری -->
        <div class="gallery" id="gallery"></div>

        <!-- مودال -->
        <div id="modal" class="modal">
            <span class="close" onclick="closeModal()">&times;</span>
            <span class="nav-btn prev" onclick="changeImage(-1)">❮</span>
            <img id="modalImg">
            <span class="nav-btn next" onclick="changeImage(1)">❯</span>
        </div>

        <footer id="footer">
            <span class="copyright">&copy; Mehran</span>
        </footer>

    </div>
</div>

<script>
window.onload = function() { document.body.classList.remove('is-preload'); }

// ۳۰ عکس آنلاین
const images = Array.from({length:30}, (_,i)=>`https://picsum.photos/300/200?random=${i+1}`);

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

let currentIndex = 0;

// ساخت گالری
images.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.alt = "Gallery image " + (index+1);
    img.onclick = () => openModal(index);
    gallery.appendChild(img);
});

function openModal(index) {
    currentIndex = index;
    modal.style.display = "block";
    modalImg.src = images[currentIndex];
}

function closeModal() {
    modal.style.display = "none";
}

function changeImage(step) {
    currentIndex += step;
    if(currentIndex < 0) currentIndex = images.length-1;
    if(currentIndex >= images.length) currentIndex = 0;
    modalImg.src = images[currentIndex];
}
</script>

</body>
</html>
