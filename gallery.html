<!DOCTYPE HTML>
<html>
<head>
    <title>Gallery</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />

    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
            padding-top: 100px;
        }

        .gallery img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            text-align: center;
        }

        .modal img {
            max-width: 80%;
            max-height: 80%;
            margin-top: 40px;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            color: white;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }

        .prev { left: 20px; }
        .next { right: 20px; }
    </style>
</head>

<body class="is-preload">
<div id="wrapper">
    <div id="bg"></div>
    <div id="overlay"></div>

    <div id="main">

        <!-- Gallery -->
        <div class="gallery" id="gallery"></div>

        <!-- Modal -->
        <div id="modal" class="modal">
            <span class="close" onclick="closeModal()">&times;</span>
            <span class="nav-btn prev" onclick="changeImage(-1)">❮</span>
            <img id="modalImg">
            <span class="nav-btn next" onclick="changeImage(1)">❯</span>
        </div>

    </div>
</div>

<script>
const images = [
    // 🔥 اینجا لینک عکس‌هات رو بذار (۳۰ تا)
    "images/1.jpg","images/2.jpg","images/3.jpg","images/4.jpg","images/5.jpg",
    "images/6.jpg","images/7.jpg","images/8.jpg","images/9.jpg","images/10.jpg",
    "images/11.jpg","images/12.jpg","images/13.jpg","images/14.jpg","images/15.jpg",
    "images/16.jpg","images/17.jpg","images/18.jpg","images/19.jpg","images/20.jpg",
    "images/21.jpg","images/22.jpg","images/23.jpg","images/24.jpg","images/25.jpg",
    "images/26.jpg","images/27.jpg","images/28.jpg","images/29.jpg","images/30.jpg"
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

let currentIndex = 0;

// ساخت گالری
images.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => openModal(index);
    gallery.appendChild(img);
});

function openModal(index) {
    currentIndex = index;
    modal.style.display = "block";
    modalImg.src = images[currentIndex];
}

function closeModal() {
    modal.style.display = "none";
}

function changeImage(step) {
    currentIndex += step;

    if (currentIndex < 0) currentIndex = images.length - 1;
    if (currentIndex >= images.length) currentIndex = 0;

    modalImg.src = images[currentIndex];
}
</script>

</body>
</html>
