<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      color: #333;
      text-align: center;
    }
    .container {
      padding: 50px 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 25px;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .social-icons a {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #f0f0f0;
      color: #333;
      font-size: 1.5rem;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .social-icons a:hover {
      background: #333;
      color: #fff;
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mehran Farahi</h1>
    <div class="social-icons">
      <a href="https://www.youtube.com/@YourChannel" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://www.instagram.com/YourUsername" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://twitter.com/YourUsername" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
      <a href="https://www.linkedin.com/in/YourUsername" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </div>
</body>
</html>
