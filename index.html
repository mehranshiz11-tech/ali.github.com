<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحه شخصی</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: 'Vazirmatn', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://source.unsplash.com/1920x1080/?abstract,gradient') no-repeat center center/cover;
      color: white;
      text-align: center;
    }
    .container {
      background: rgba(0, 0, 0, 0.5);
      padding: 50px 30px;
      border-radius: 15px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .social-icons a {
      display: inline-block;
      width: 50px;
      height: 50px;
      line-height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1.5rem;
      transition: all 0.3s ease;
    }
    .social-icons a:hover {
      background: white;
      color: #000;
      transform: scale(1.2);
    }
  </style>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>Mehrān Farahi</h1>
    <div class="social-icons">
      <a href="https://www.youtube.com/@YourChannel" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://www.instagram.com/YourUsername" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://twitter.com/YourUsername" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
      <a href="https://www.linkedin.com/in/YourUsername" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </div>
</body>
</html>
